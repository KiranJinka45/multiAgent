version: '3.9'

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: multiagent
    ports:
      - "54399:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - multiagent-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - multiagent-network

  # ── MultiAgent Services ───────────────────────────────────────────────────
  
  core-api:
    build:
      context: .
      dockerfile: apps/core-api/Dockerfile
    container_name: core-api
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
      - PORT=3010
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/multiagent
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3010/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - multiagent-network

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "4005:4005"
    environment:
      - NODE_ENV=production
      - PORT=4005
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/multiagent
      - REDIS_URL=redis://redis:6379
    depends_on:
      core-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - multiagent-network

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/multiagent
      - REDIS_URL=redis://redis:6379
    depends_on:
      auth-service:
        condition: service_healthy
    networks:
      - multiagent-network

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: gateway
    ports:
      - "3500:3500"
    environment:
      - NODE_ENV=production
      - PORT=3500
      - CORE_API_URL=http://core-api:3010
      - AUTH_SERVICE_URL=http://auth-service:4005
    depends_on:
      core-api:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3500/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - multiagent-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: frontend
    ports:
      - "4200:80"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - multiagent-network

networks:
  multiagent-network:
    driver: bridge