apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: multiagent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: core-api
  template:
    metadata:
      labels:
        app: core-api
    spec:
      containers:
      - name: core-api
        image: multiagent/core-api:latest
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: multiagent-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: multiagent-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: multiagent-secrets
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: multiagent-secrets
              key: JWT_SECRET
        - name: INTERNAL_KEY
          valueFrom:
            secretKeyRef:
              name: multiagent-secrets
              key: INTERNAL_KEY
        - name: SERVICE_NAME
          value: "core-api"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: core-api
  namespace: multiagent
spec:
  selector:
    app: core-api
  ports:
  - protocol: TCP
    port: 3001
    targetPort: 3001
