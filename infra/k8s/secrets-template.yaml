apiVersion: v1
kind: Secret
metadata:
  name: multiagent-prod-secrets
  namespace: multi-agent
type: Opaque
stringData:
  # --- Core Auth ---
  # Generate a 32+ character random string
  JWT_SECRET: "PLACEHOLDER_HIGH_ENTROPY_STRING"

  # --- Zero Trust (RSA Key Pair) ---
  # Generate via: openssl genrsa -out private.pem 4096 && openssl rsa -in private.pem -pubout -out public.pem
  INTERNAL_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    PLACEHOLDER_BASE64_PRIVATE_KEY
    -----END RSA PRIVATE KEY-----
  INTERNAL_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    PLACEHOLDER_BASE64_PUBLIC_KEY
    -----END PUBLIC KEY-----

  # --- Billing ---
  STRIPE_SECRET_KEY: "sk_live_PLACEHOLDER"
  STRIPE_WEBHOOK_SECRET: "whsec_PLACEHOLDER"

  # --- Database ---
  DATABASE_URL: "postgresql://postgres:PLACEHOLDER_DB_PASSWORD@postgres-service:5432/multiagent?schema=public"
  REDIS_URL: "redis://redis-sentinel-svc:26379"

  # --- External Services ---
  OPENAI_API_KEY: "sk-proj-PLACEHOLDER"
  KAFKA_BROKERS: "kafka-0.kafka-headless:9092,kafka-1.kafka-headless:9092"
