apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: multiagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      containers:
        - name: agent-service
          image: agent-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4002
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: multiagent
spec:
  selector:
    app: agent-service
  ports:
    - port: 80
      targetPort: 4002
---
