apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multiagent-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 80
