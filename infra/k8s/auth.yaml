apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: multiagent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: multiagent/auth-service:latest
        ports:
        - containerPort: 4004
        envFrom:
        - configMapRef:
            name: multiagent-config
        readinessProbe:
          httpGet:
            path: /me
            port: 4004
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: multiagent
spec:
  selector:
    app: auth-service
  ports:
  - protocol: TCP
    port: 4004
    targetPort: 4004
