apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: multiagent-gateway
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: multiagent-vs
spec:
  hosts:
    - "*"
  gateways:
    - multiagent-gateway
  http:
    - match:
        - uri:
            prefix: /api
      route:
        - destination:
            host: api-service
            port:
              number: 80
    - route:
        - destination:
            host: web-service
            port:
              number: 80
