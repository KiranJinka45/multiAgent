apiVersion: apps/v1
kind: Deployment
metadata:
  name: multiagent-web
  labels:
    app: multiagent-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: multiagent-web
  template:
    metadata:
      labels:
        app: multiagent-web
    spec:
      containers:
        - name: web
          image: multiagent-web:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              value: "http://localhost/api"
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  type: ClusterIP
  selector:
    app: multiagent-web
  ports:
    - port: 80
      targetPort: 3000
