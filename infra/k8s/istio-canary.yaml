apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: gateway-canary
  namespace: multi-agent
spec:
  hosts:
  - "api.multiagent.io"
  gateways:
  - multiagent-gateway
  http:
  - route:
    - destination:
        host: gateway-service
        subset: stable
      weight: 95
    - destination:
        host: gateway-service
        subset: canary
      weight: 5
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: gateway-destination
  namespace: multi-agent
spec:
  host: gateway-service
  subsets:
  - name: stable
    labels:
      version: stable
  - name: canary
    labels:
      version: canary
