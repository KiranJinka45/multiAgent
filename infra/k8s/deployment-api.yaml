apiVersion: apps/v1
kind: Deployment
metadata:
  name: multiagent-api
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: multiagent-api:latest
          ports:
            - containerPort: 4288
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@db:5432/multiagent"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: PORT
              value: "4288"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 4288
