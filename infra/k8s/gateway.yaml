apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: multiagent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: multiagent/api-gateway:latest
        ports:
        - containerPort: 4080
        envFrom:
        - configMapRef:
            name: multiagent-config
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: multiagent-secrets
              key: JWT_SECRET
        - name: INTERNAL_KEY
          valueFrom:
            secretKeyRef:
              name: multiagent-secrets
              key: INTERNAL_KEY
        - name: SERVICE_NAME
          value: "api-gateway"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 4080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /ready
            port: 4080
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: multiagent
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
  - protocol: TCP
    port: 80
    targetPort: 4080
