apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: multiagent
  labels:
    app: billing-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4003"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: billing-service
          image: multiagent/billing-service:latest
          ports:
            - containerPort: 4003
          env:
            - name: PORT
              value: "4003"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: database-url
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: stripe-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: stripe-webhook-secret
            - name: INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: internal-key
            - name: AUTH_SERVICE_URL
              value: "http://auth-service.multiagent.svc.cluster.local"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: multiagent
spec:
  selector:
    app: billing-service
  ports:
    - port: 4003
      targetPort: 4003
