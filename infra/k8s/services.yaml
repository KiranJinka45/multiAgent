# MISSION SERVICE
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-service
  namespace: multiagent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mission-service
  template:
    metadata:
      labels:
        app: mission-service
    spec:
      containers:
      - name: mission-service
        image: multiagent/mission-service:latest
        ports:
        - containerPort: 4001
        readinessProbe:
          httpGet:
            path: /missions
            port: 4001
---
apiVersion: v1
kind: Service
metadata:
  name: mission-service
  namespace: multiagent
spec:
  selector:
    app: mission-service
  ports:
  - protocol: TCP
    port: 4001
    targetPort: 4001
---
# AGENT SERVICE
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: multiagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      containers:
      - name: agent-service
        image: multiagent/agent-service:latest
        ports:
        - containerPort: 4002
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: multiagent
spec:
  selector:
    app: agent-service
  ports:
  - protocol: TCP
    port: 4002
    targetPort: 4002
