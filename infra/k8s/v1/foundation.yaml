apiVersion: v1
kind: Namespace
metadata:
  name: multiagent
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: multiagent
data:
  # Internal Mesh Map (StatefulSet stable IDs)
  AUTH_SERVICE_URL: "http://auth-0.auth-service.multiagent.svc.cluster.local:4002"
  BILLING_SERVICE_URL: "http://billing-service:4003"
  CORE_API_URL: "http://core-api:3001"
  ORCHESTRATOR_URL: "http://core-api:3001"
  DATABASE_URL_K8S: "postgres://postgres-0.postgres:5432/multiagent"
  REDIS_URL_K8S: "redis://redis-0.redis:6379"
  
  # Environment Context
  NODE_ENV: "production"
  PORT: "3001" # Default for backend services
  GATEWAY_PORT: "4080"
  
  # Observability (L5)
  ENABLE_TRACING: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo.monitoring.svc.cluster.local:4317"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multiagent-ingress
  namespace: multiagent
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "route"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
  - hosts:
      - multiagent.local
    secretName: tls-secret
  rules:
  - host: multiagent.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80
