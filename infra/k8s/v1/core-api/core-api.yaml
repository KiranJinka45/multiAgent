apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: multiagent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: core-api
  template:
    metadata:
      labels:
        app: core-api
    spec:
      imagePullSecrets:
      - name: ghcr-login
      terminationGracePeriodSeconds: 30
      containers:
      - name: core-api
        image: multiagent/core-api:v2.0.0
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: app-config
        env:
        - name: DATABASE_URL
          value: "postgres://postgres-0.postgres:5432/multiagent"
        - name: REDIS_URL
          value: "redis://redis-0.redis:6379"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_SECRET
        - name: INTERNAL_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INTERNAL_KEY
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: core-api
  namespace: multiagent
spec:
  selector:
    app: core-api
  ports:
  - port: 3001
    targetPort: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: core-api-hpa
  namespace: multiagent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: core-api
  minReplicas: 2
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
