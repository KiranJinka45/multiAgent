apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: multiagent
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
      - name: ghcr-login
      terminationGracePeriodSeconds: 30
      containers:
      - name: api-gateway
        image: multiagent/api-gateway:v2.0.0
        ports:
        - containerPort: 4080
        envFrom:
        - configMapRef:
            name: app-config
        env:
        - name: NODE_ENV
          value: "production"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_SECRET
        - name: INTERNAL_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INTERNAL_KEY
        - name: DATABASE_URL
          value: "postgres://postgres-0.postgres:5432/multiagent"
        - name: REDIS_URL
          value: "redis://redis-0.redis:6379"
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 4080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /ready
            port: 4080
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: multiagent
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 4080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: multiagent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
