apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: multiagent
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s
    rule_files:
      - "/etc/prometheus/alert_rules.yml"
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - "alertmanager:9093"
    scrape_configs:
      - job_name: 'multiagent-services'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: (api-gateway|core-api|auth-service|billing-service)
  alert_rules.yml: |
    groups:
      - name: multiagent_alerts
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
          - alert: HighErrorRate
            expr: rate(http_request_duration_seconds_count{status_code=~"5.."}[5m]) > 0.05
            for: 2m
            labels:
              severity: critical
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: multiagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config-volume
          mountPath: /etc/prometheus
      volumes:
      - name: config-volume
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: multiagent
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: multiagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:latest
        ports:
        - containerPort: 9093
        env:
        - name: SLACK_API_URL
          value: "https://hooks.slack.com/services/YOUR/WEBHOOK/HERE"
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: multiagent
spec:
  selector:
    app: alertmanager
  ports:
  - port: 9093
    targetPort: 9093
