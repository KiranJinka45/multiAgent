apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-core-api
  labels:
    app: core-api
spec:
  replicas: {{ .Values.coreApi.replicaCount }}
  selector:
    matchLabels:
      app: core-api
  template:
    metadata:
      labels:
        app: core-api
    spec:
      imagePullSecrets:
      - name: ghcr-login
      terminationGracePeriodSeconds: 30
      containers:
      - name: core-api
        image: "{{ .Values.coreApi.image.repository }}:{{ .Values.coreApi.image.tag }}"
        imagePullPolicy: {{ .Values.coreApi.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.coreApi.service.port }}
        envFrom:
        - configMapRef:
            name: app-config
        env:
        - name: DATABASE_URL
          value: {{ .Values.secrets.databaseUrl | quote }}
        - name: REDIS_URL
          value: {{ .Values.secrets.redisUrl | quote }}
        - name: JWT_SECRET
          value: {{ .Values.secrets.jwtSecret | quote }}
        - name: INTERNAL_KEY
          value: {{ .Values.secrets.internalKey | quote }}
        resources:
          {{- toYaml .Values.coreApi.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /health/ready
            port: {{ .Values.coreApi.service.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-core-api
spec:
  selector:
    app: core-api
  ports:
  - port: {{ .Values.coreApi.service.port }}
    targetPort: {{ .Values.coreApi.service.port }}
---
{{- if .Values.coreApi.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-core-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-core-api
  minReplicas: {{ .Values.coreApi.hpa.minReplicas }}
  maxReplicas: {{ .Values.coreApi.hpa.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.coreApi.hpa.cpuTarget }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.coreApi.hpa.memoryTarget }}
{{- end }}
