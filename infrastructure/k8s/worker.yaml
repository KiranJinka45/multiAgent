apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-worker
spec:
  replicas: 5
  selector:
    matchLabels:
      app: temporal-worker
  template:
    metadata:
      labels:
        app: temporal-worker
    spec:
      containers:
      - name: worker
        image: multi-agent-worker:latest
        env:
        - name: TEMPORAL_ADDRESS
          value: "temporal-server:7233"
        - name: KUBERNETES_SERVICE_HOST
          value: "kubernetes.default.svc"
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "200m"
            memory: "256Mi"
