apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: multi-agent-gateway:latest
        ports:
        - containerPort: 4000
        env:
        - name: PORT
          value: "4000"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service"
        - name: ORCHESTRATOR_URL
          value: "http://orchestrator"
        - name: BILLING_SERVICE_URL
          value: "http://billing-service"
        - name: INTERNAL_KEY
          valueFrom:
            secretKeyRef:
              name: cluster-secrets
              key: internal-key
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4000
  type: LoadBalancer
