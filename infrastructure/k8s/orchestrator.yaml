apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
      - name: orchestrator
        image: multi-agent-orchestrator:latest
        ports:
        - containerPort: 4001
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        env:
        - name: PORT
          value: "4001"
        - name: INTERNAL_KEY
          valueFrom:
            secretKeyRef:
              name: cluster-secrets
              key: internal-key
        - name: TEMPORAL_ADDRESS
          value: "temporal-server:7233"
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
spec:
  selector:
    app: orchestrator
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4001
