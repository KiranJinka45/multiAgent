services:
  - type: web
    name: ztan-backend
    runtime: node
    plan: free

    buildCommand: pnpm install && pnpm build --filter @apps/core-api
    startCommand: pnpm start --filter @apps/core-api

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: ztan-db
          property: connectionString

      - key: USE_REAL_SIGNALS
        value: "false"

      - key: INTERNAL_SERVICE_TOKEN
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: ztan-db
    plan: free
