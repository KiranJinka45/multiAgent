services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: multiagent
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/multiagent
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      INTERNAL_KEY: ${INTERNAL_KEY:-internal-key}
    ports:
      - "4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    environment:
      NODE_ENV: production
      AUTH_SERVICE_URL: http://auth-service:4002
      INTERNAL_KEY: ${INTERNAL_KEY:-internal-key}
    ports:
      - "4081:4081"
    depends_on:
      - auth-service

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/multiagent
      REDIS_URL: redis://redis:6379
      INTERNAL_KEY: ${INTERNAL_KEY:-internal-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/multiagent
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  core-api:
    build:
      context: .
      dockerfile: apps/core-api/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/multiagent
      REDIS_URL: redis://redis:6379
    ports:
      - "4001:4001"
    depends_on:
      - postgres
      - redis
