name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  push-to-ghcr:
    name: Push to GHCR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    strategy:
      matrix:
        service: [auth-service, gateway, worker, api, core-api, billing-service]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}

  trigger-staging-deploy:
    name: Trigger Staging Deploy
    runs-on: ubuntu-latest
    needs: push-to-ghcr
    
    steps:
      - name: Notify Staging Cluster
        run: |
          echo "Staging images updated. Triggering ArgoCD/Flux/Webhook..."
          # Example: curl -X POST ${{ secrets.STAGING_WEBHOOK_URL }}
