name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 3. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # 4. Cache Turbo
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # 5. Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 6. Quality Checks
      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # 7. Build Project (pnpm build)
      - name: Build
        run: pnpm build

      # 8. Docker Hub Login
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 9. Build and Push Docker Image
      - name: Build and Push Docker Image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/multiagent:latest

      # 10. Deploy to Server (Zero-Downtime)
      - name: Deploy to Server
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/multiagent:latest
            
            # Zero-Downtime Strategy (Stop, Rename, Start, Remove)
            docker stop multiagent_old || true
            docker rm multiagent_old || true
            
            # Rename existing to old
            docker rename multiagent multiagent_old || true
            
            # Start new container
            docker run -d \
              -p 3000:3000 \
              --name multiagent \
              --restart always \
              -e NODE_ENV=production \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              -e REDIS_URL=${{ secrets.REDIS_URL }} \
              ${{ secrets.DOCKER_USERNAME }}/multiagent:latest
            
            # Optional: Health check before removing old
            sleep 10
            docker ps | grep multiagent
