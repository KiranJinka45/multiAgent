name: Deploy MultiAgent

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build Monorepo
        run: pnpm build

      - name: Docker Build
        run: docker build -t multiagent .

      - name: Deploy Placeholder
        run: echo "Deploy to server / AWS ECS / VPS successfully configured"
