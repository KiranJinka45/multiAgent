name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-gate:
    name: Build, Typecheck & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Pre-flight Integrity Guard
        run: pnpm run predev
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/multiagent"
          REDIS_URL: "redis://localhost:6379"
          SUPABASE_URL: "http://localhost"
          SUPABASE_SERVICE_ROLE_KEY: "key"
          JWT_SECRET: "secret"
          INTERNAL_KEY: "key"

      - name: Build Monorepo (Turbo)
        run: pnpm build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Run Tests
        run: pnpm turbo run test

  container-check:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: quality-gate
    
    strategy:
      matrix:
        service: [auth-service, gateway, worker, api, core-api, billing-service]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} Image
        run: |
          docker build -t multiagent-${{ matrix.service }}:latest -f apps/${{ matrix.service }}/Dockerfile .

