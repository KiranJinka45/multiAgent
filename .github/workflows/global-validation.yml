# .github/workflows/global-validation.yml
name: Global Tier-1 Validation + Chaos

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-global-integrity:
    name: Global Integrity & Chaos Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🛠️ Initialize DB Schema
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/postgres

      # 🔥 BASELINE TESTS
      - name: 🧠 Split Brain Test
        run: node scripts/global-validation/split-brain.js
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/postgres

      - name: ⚡ Race Test
        run: node scripts/global-validation/cross-region-race.js
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/postgres

      # 💥 ADVERSARIAL CHAOS
      - name: 💥 Chaos Runner
        run: node scripts/chaos/chaos-runner.js
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/postgres

      # 🌐 WEBSOCKET STRESS (k6)
      - name: 🌐 Setup k6
        uses: grafana/setup-k6-action@v1

      - name: 🌪️ WebSocket Reconnect Storm
        run: k6 run scripts/global-validation/websocket-storm.js
        continue-on-error: true # Don't block yet if only perf-degraded

      # 📊 FINAL RESULTS
      - name: ✅ Validate Final State
        run: node scripts/global-validation/event-consistency.js
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/postgres
