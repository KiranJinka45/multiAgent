apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-engine-sa
  namespace: sre-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sre-actuator-role
  namespace: default # Assumes target apps are in 'default'
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sre-engine-actuator-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: sre-engine-sa
    namespace: sre-system
roleRef:
  kind: Role
  name: sre-actuator-role
  apiGroup: rbac.authorization.k8s.io
