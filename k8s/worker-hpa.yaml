# KEDA ScaledObject for Worker Fleet
# Scales workers based on the length of the pending jobs list in Redis
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-scaler
  namespace: default
spec:
  scaleTargetRef:
    name: worker
  minReplicaCount: 1
  maxReplicaCount: 20
  pollingInterval: 10
  cooldownPeriod:  60
  triggers:
  - type: redis
    metadata:
      address: redis-master.default.svc.cluster.local:6379 
      listName: bull:build-queue:wait
      listLength: "5"
    authenticationRef:
      name: worker-keda-auth
  - type: redis
    metadata:
      address: redis-master.default.svc.cluster.local:6379 
      listName: bull:pro-build-queue:wait
      listLength: "2"
    authenticationRef:
      name: worker-keda-auth
  - type: redis
    metadata:
      address: redis-master.default.svc.cluster.local:6379 
      listName: bull:self-evolution:wait
      listLength: "1"
    authenticationRef:
      name: worker-keda-auth
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: worker-keda-auth
  namespace: default
spec:
  secretTargetRef:
  - parameter: password
    name: platform-secrets
    key: redis-password
