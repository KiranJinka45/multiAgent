# ГўвҖқвӮ¬ГўвҖқвӮ¬ Baseline: Default Deny All Ingress ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: multiagent
spec:
  podSelector: {}
  policyTypes:
  - Ingress

---
# в”Җв”Җ Allow Ingress Controller to Gateway в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-gateway
  namespace: multiagent
spec:
  podSelector:
    matchLabels:
      app: gateway
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
---
# в”Җв”Җ Allow Gateway to Service Mesh (North-South) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-services
  namespace: multiagent
spec:
  podSelector:
    matchExpressions:
    - {key: app, operator: In, values: [auth-service, billing-service, core-api, api]}
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: gateway
---
# в”Җв”Җ Allow Service Mesh Internal Comms (East-West) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mesh-internal
  namespace: multiagent
spec:
  podSelector:
    matchExpressions:
    - {key: app, operator: In, values: [billing-service, worker, core-api, api]}
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: core-api # Orchestrator triggers billing/workers
    - podSelector:
        matchLabels:
          app: api # Neural Link proxies to Core API
---
# в”Җв”Җ Allow Service Mesh to State Layer (Redis/Postgres) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mesh-to-state
  namespace: multiagent
spec:
  podSelector:
    matchExpressions:
    - {key: app, operator: In, values: [redis, postgres, pgbouncer]}
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: auth-service
    - podSelector:
        matchLabels:
          app: gateway
    - podSelector:
        matchLabels:
          app: billing-service
    - podSelector:
        matchLabels:
          app: core-api
    - podSelector:
        matchLabels:
          app: api
    - podSelector:
        matchLabels:
          app: worker
---
# в”Җв”Җ SRE Hardening: Allow Observability (Telemetry Paths) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: multiagent
spec:
  podSelector:
    matchLabels:
      telemetry: "enabled"
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - port: 4002 # Auth
    - port: 4081 # Gateway
    - port: 4001 # Core API
    - port: 4003 # Billing
    - port: 4000 # API Mesh
    - port: 8082 # Worker
---
# в”Җв”Җ SRE Hardening: Allow Tracing Egress в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tracing-egress
  namespace: multiagent
spec:
  podSelector:
    matchLabels:
      telemetry: "enabled"
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: jaeger
    ports:
    - port: 4317 # OTLP gRPC endpoint


