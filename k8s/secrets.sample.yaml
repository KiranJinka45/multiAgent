apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: multiagent
type: Opaque
stringData:
  database-url: "postgresql://postgres:postgres@postgres.multiagent.svc.cluster.local:5432/multiagent"
  redis-url: "redis://redis.multiagent.svc.cluster.local:6379"
  redis-password: "your-redis-password"
  otel-endpoint: "http://otel-collector.monitoring.svc.cluster.local:4318/v1/traces"
  jwt-secret: "your-super-secret-jwt-key"
  stripe-key: "your-stripe-secret-key"
  stripe-webhook-secret: "your-stripe-webhook-secret"
