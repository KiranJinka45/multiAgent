apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
type: Opaque
data:
  # Base64 encoded values (e.g. echo -n "value" | base64)
  database-url: REPLACE_WITH_BASE64_DATABASE_URL
  redis-url: REPLACE_WITH_BASE64_REDIS_URL
  redis-password: REPLACE_WITH_BASE64_REDIS_PASSWORD
  otel-endpoint: REPLACE_WITH_BASE64_OTEL_ENDPOINT
