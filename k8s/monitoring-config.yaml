apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: multiagent
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "/etc/prometheus/alerts.yml"

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - "alertmanager:9093"

    scrape_configs:
      - job_name: 'multiagent-gateway'
        static_configs:
          - targets: ['gateway:4081']

      - job_name: 'multiagent-worker'
        static_configs:
          - targets: ['worker:8080']

      - job_name: 'multiagent-auth'
        static_configs:
          - targets: ['auth-service:4002']
