# ── Enterprise SRE: Lightweight internal mTLS (Certificate Template) ──────
# This manifest defines the skeleton for internal TLS certificates.
# In a real production cluster, these should be managed by cert-manager.

apiVersion: v1
kind: Secret
metadata:
  name: internal-ca-certs
  annotations:
    sre-managed: "true"
type: kubernetes.io/tls
stringData:
  # Internal CA used for signing and verifying inter-service traffic
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    MIICJTCCAY4CCQC7Y9Fp9J... (Placeholder Internal CA Root)
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN RSA PRIVATE KEY-----
    MIIEowIBAAKCAQEA... (Placeholder CA Key)
    -----END RSA PRIVATE KEY-----
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-tls
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    MIICIDCCAYm... (Placeholder signed cert for auth-service.production.svc)
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN RSA PRIVATE KEY-----
    MIIEow... (Placeholder key for auth-service)
    -----END RSA PRIVATE KEY-----
---
apiVersion: v1
kind: Secret
metadata:
  name: gateway-service-tls
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    MIICIDCCAYm... (Placeholder signed cert for gateway.production.svc)
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN RSA PRIVATE KEY-----
    MIIEow... (Placeholder key for gateway)
    -----END RSA PRIVATE KEY-----
