apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multiagent-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # SRE Hardening: Ingress-level rate limiting (protection at the entrypoint)
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # Advanced failover strategy as proven in chaos tests
    nginx.ingress.kubernetes.io/proxy-next-upstream: "error timeout http_502 http_503 http_504"
    nginx.ingress.kubernetes.io/proxy-next-upstream-tries: "3"
    nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: "10s"
spec:
  tls:
  - hosts:
    - multiagent.local
    secretName: tls-secret
  rules:
  - host: multiagent.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 4081
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000

