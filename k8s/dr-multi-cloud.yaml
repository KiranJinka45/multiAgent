# ── Enterprise SRE: Multi-Cloud Durability Blueprint ──────────────────────
# This manifest provides the strategy for cross-provider backup replication
# (Primary: AWS S3 -> Secondary: GCP GCS) using an Rclone-compatible sync.

apiVersion: batch/v1
kind: CronJob
metadata:
  name: multi-cloud-backup-sync
spec:
  schedule: "@daily" # Synchronize to secondary cloud daily
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: cloud-sync
            image: rclone/rclone:latest
            args:
            - "sync"
            - "primary-aws:/backups"
            - "secondary-gcp:/backups-vault"
            volumeMounts:
            - name: rclone-config
              mountPath: /config/rclone
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 200m
                memory: 512Mi
          restartPolicy: OnFailure
          volumes:
          - name: rclone-config
            secret:
              secretName: multi-cloud-vault-creds
---
# ── Multi-Cloud vault Credentials (TEMPLATE) ──────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: multi-cloud-vault-creds
type: Opaque
stringData:
  rclone.conf: |
    [primary-aws]
    type = s3
    provider = AWS
    access_key_id = <AWS_KEY>
    secret_access_key = <AWS_SECRET>
    region = us-east-1

    [secondary-gcp]
    type = google cloud storage
    project_number = <GCP_PROJECT>
    service_account_file = /etc/gcp/sa.json
    location = us-central1
