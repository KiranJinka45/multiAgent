# ── GitOps Mastery: ArgoCD Application ─────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: multiagent-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/user/multiagent-auth-mesh.git' 
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: multiagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - Validate=true
