apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: billing-service
  namespace: multiagent
  labels:
    app: billing-service
spec:
  replicas: 2
  strategy:
    canary:
      maxUnavailable: 0
      maxSurge: 1
      steps:
      - setWeight: 20
      - pause: {duration: 2m}
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
        telemetry: "enabled"
    spec:
      containers:
      - name: billing-service
        image: ghcr.io/kiran/multiagent-billing:v1.1.0
        imagePullPolicy: IfNotPresent
        command: ["node", "dist/index.js"]
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "4003"
        envFrom:
        - secretRef:
            name: multiagent-billing-secrets
        ports:
        - containerPort: 4003
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        startupProbe:
          httpGet:
            path: /health
            port: 4003
          failureThreshold: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 4003
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 4003
          initialDelaySeconds: 5
          periodSeconds: 5
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: multiagent
spec:
  ports:
  - port: 4003
    targetPort: 4003
    protocol: TCP
  selector:
    app: billing-service
