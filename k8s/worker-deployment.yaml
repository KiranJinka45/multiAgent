apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: worker
  namespace: multiagent
  labels:
    app: worker
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 2
  strategy:
    canary:
      analysis:
        templates:
        - templateName: success-rate
      steps:
      - setWeight: 20
      - pause: {duration: 5m}
      - setWeight: 50
      - pause: {duration: 10m}
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        telemetry: "enabled"
    spec:
      enableServiceLinks: false
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: "kubernetes.io/hostname"
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: worker
      containers:
      - name: worker
        image: ghcr.io/kiran/multiagent-worker:v1.1.0


        imagePullPolicy: IfNotPresent
        command: ["node", "dist/index.js"]
        envFrom:
        - secretRef:
            name: multiagent-core-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi" # Increased for build/git heavy operations
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]

