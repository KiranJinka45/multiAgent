# ── Frontend Service (Next.js Hardened) ──────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend
  namespace: multiagent
  labels:
    app: frontend
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 3
  strategy:
    canary:
      maxUnavailable: 0
      maxSurge: 1
      steps:
      - setWeight: 10
      - pause: {duration: 2m}
      - setWeight: 25
      - pause: {duration: 5m}
      analysis:
        templates:
        - templateName: success-rate
        args:
        - name: app-name
          value: frontend
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # SRE Hardening: Inter-Pod Anti-Affinity and Topology Spread
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: frontend
              topologyKey: "kubernetes.io/hostname"
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: "topology.kubernetes.io/zone"
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: frontend
      containers:
      - name: frontend
        image: ghcr.io/kiran/multiagent-frontend:v1.1.0

        imagePullPolicy: IfNotPresent
        command: ["node", "apps/frontend/server.js"]
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXT_PUBLIC_API_URL
          value: "http://gateway:4081" # Internal mesh routing

        ports:
        - containerPort: 3006
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 400m
            memory: 512Mi
        startupProbe:
          httpGet:
            path: /api/health
            port: 3006
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3006
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: / # Basic root check for UI readiness
            port: 3006
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: multiagent
spec:
  ports:
  - port: 3000
    targetPort: 3006
    protocol: TCP
  selector:
    app: frontend
