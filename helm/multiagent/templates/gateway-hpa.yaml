{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "multiagent.fullname" . }}-gateway-hpa
  labels:
    app.kubernetes.io/name: {{ include "multiagent.name" . }}-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "multiagent.fullname" . }}-gateway
  minReplicas: {{ .Values.autoscaling.gateway.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.gateway.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.gateway.cpuAverageUtilization }}
    - type: Pods
      pods:
        metric:
          name: socket_active_connections
        target:
          type: AverageValue
          averageValue: {{ .Values.autoscaling.gateway.socketConnectionTarget | quote }}
{{- end }}
