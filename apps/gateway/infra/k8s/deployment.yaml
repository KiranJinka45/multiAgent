apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
    tier: entry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gateway
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: gateway
        image: multiagent/gateway:prod-latest
        ports:
        - containerPort: 4000
        envFrom:
        - configMapRef:
            name: global-config
        - secretRef:
            name: global-secrets
        
        # RESOURCE HARDENING (Nyquist Standard)
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"

        # HEALTH PROBES (Dual-Depth Alignment)
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health/details
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 10
        
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
