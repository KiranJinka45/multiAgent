apiVersion: apps/v1
kind: Deployment
metadata:
  name: socket-gateway
  namespace: multiagent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: socket
  template:
    metadata:
      labels:
        app: socket
    spec:
      containers:
        - name: socket
          image: your-account-id.dkr.ecr.ap-south-1.amazonaws.com/multiagent-api:latest
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          ports:
            - containerPort: 3011
          env:
            - name: NODE_ENV
              value: "production"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: multiagent-secrets
                  key: redis-url
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: multiagent-secrets
                  key: database-url

---
apiVersion: v1
kind: Service
metadata:
  name: socket-gateway
  namespace: multiagent
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  selector:
    app: socket
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3011

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: socket-gateway-hpa
  namespace: multiagent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: socket-gateway
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
