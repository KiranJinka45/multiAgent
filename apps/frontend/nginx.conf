server {
  listen 80;

  # Static files
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /index.html;
    
    # CSP: Production-Hardened Security
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ws://localhost:3500 http://localhost:3500 http://127.0.0.1:3500 ws://127.0.0.1:3500; img-src 'self' data:; frame-src 'none';" always;
  }

  # API Proxy
  location /api {
    proxy_pass http://gateway:3500;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Socket.io Proxy
  location /socket.io {
    proxy_pass http://gateway:3500;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }
}
